    <title>Practical12</title>

<body>
    <!-- Header Section -->
    <div class="header">
        <h4>Chinmoy Kalita</h4>
        <p>This practical is the solution of the practical 12</p>
    </div>
    <!-- Content section -->
    <div class="content">
        <div class="regform">
            <fieldset>
                <form>
                    <legend>Login Page</legend>
                    <p>
                        <label for="EmailId">EmailId</label>
                        <input type="email" id="emailid" placeholder="Enter your Username..">
                    </p>
                    <p>
                        <label for="password">password</label>
                        <input type="password" name="pwd" id="pwd" placeholder="Enter your password..">
                    </p>
                    <p>
                    <h5>Don't have account?<a href="practical11.html">sign in</a></h5>
                    </p>
                    <p>
                        <button type="submit" onclick="validation()">Submit</button>
                        <button type="Reset">Reset</button>
                    </p>
                </form>
            </fieldset>
        </div>
        <div class="validationJS">
            <script>
                function validation() {
                    let emailID = document.getElementById("emailid").value;
                    let pwd = document.getElementById("pwd").value;

                    if (emailID == "" || pwd == "") {
                        alert("Please enter in the empty field.");
                        return false;
                    }
                    else {
                        return true;
                    }

                }
            </script>
        </div>
        <!-- Footer Section -->
        <div class="Footer">

        </div>
</body>
